name: Build & Release VaultMate

on:
  push:
    tags:
      - 'v*.*.*'     # Trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write   # Needed to create GitHub Releases

jobs:
  # ============================================================
  # BUILD: Linux (Ubuntu)
  # ============================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libsecret-1-dev \
            libdbus-glib-1-dev pkg-config

      - name: Install Python dependencies
        working-directory: Application
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build with PyInstaller
        working-directory: Application
        env:
          VAULTMATE_VERSION: ${{ github.ref_name }}
        run: |
          pyinstaller vaultmate.spec --clean --noconfirm
          cp native_host.py dist/VaultMate/
          # Create bundled native host launcher
          cat > dist/VaultMate/native_host.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec python3 "$DIR/native_host.py" "$@"
          EOF
          chmod +x dist/VaultMate/native_host.sh

      - name: Package as tar.gz
        working-directory: Application
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          tar -czf "../VaultMate-${VERSION}-linux-x86_64.tar.gz" -C dist VaultMate/
          echo "ARCHIVE=VaultMate-${VERSION}-linux-x86_64.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ env.ARCHIVE }}

  # ============================================================
  # BUILD: Windows
  # ============================================================
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: Application
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build with PyInstaller
        working-directory: Application
        run: |
          pyinstaller vaultmate.spec --clean --noconfirm
          Copy-Item native_host.py dist\VaultMate\

      - name: Package as ZIP
        working-directory: Application
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME"
          if (-not $VERSION) { $VERSION = "dev" }
          Compress-Archive -Path dist\VaultMate\* `
            -DestinationPath "..\VaultMate-${VERSION}-windows-x64.zip" -Force
          echo "ARCHIVE=VaultMate-${VERSION}-windows-x64.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ env.ARCHIVE }}

  # ============================================================
  # BUILD: macOS (Intel + Apple Silicon)
  # ============================================================
  build-macos:
    name: Build macOS
    runs-on: macos-14       # Apple Silicon runner (arm64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        working-directory: Application
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build with PyInstaller
        working-directory: Application
        run: pyinstaller vaultmate.spec --clean --noconfirm

      - name: Embed native host into .app
        working-directory: Application
        run: |
          RESOURCES="dist/VaultMate.app/Contents/Resources"
          cp native_host.py "$RESOURCES/"
          cat > "$RESOURCES/native_host.sh" << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec python3 "$DIR/native_host.py" "$@"
          EOF
          chmod +x "$RESOURCES/native_host.sh"

      - name: Create DMG
        working-directory: Application
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          ARCH="$(uname -m)"
          DMG="VaultMate-${VERSION}-macOS-${ARCH}.dmg"
          create-dmg \
            --volname "VaultMate" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VaultMate.app" 175 190 \
            --hide-extension "VaultMate.app" \
            --app-drop-link 425 190 \
            "../${DMG}" \
            "dist/VaultMate.app"
          echo "ARCHIVE=${DMG}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ env.ARCHIVE }}

  # ============================================================
  # RELEASE: Publish all builds to GitHub Releases
  # ============================================================
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VaultMate ${{ github.ref_name }}"
          body: |
            ## 🔐 VaultMate ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |---|---|
            | 🐧 Linux (x86_64) | `VaultMate-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | 🪟 Windows (64-bit) | `VaultMate-${{ github.ref_name }}-windows-x64.zip` |
            | 🍎 macOS (Apple Silicon / Intel) | `VaultMate-${{ github.ref_name }}-macOS-*.dmg` |

            ### Installation

            **Linux:** `tar -xzf VaultMate-*-linux-x86_64.tar.gz && cd VaultMate && ./VaultMate`

            **Windows:** Unzip and double-click `VaultMate.exe`

            **macOS:** Open the `.dmg` and drag `VaultMate.app` to Applications

            ### Browser Extensions

            Load the extension folder from the repository manually in developer mode:
            - **Firefox:** `extension-firefox/` via `about:debugging`
            - **Chrome/Brave:** `extension-chrome/` via `chrome://extensions`
          draft: false
          prerelease: false
          files: release-assets/*
